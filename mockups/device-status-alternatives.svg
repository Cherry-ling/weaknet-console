<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f8fb"/>
      <stop offset="1" stop-color="#eef6f2"/>
    </linearGradient>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#173446" flood-opacity="0.14"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .eyebrow { font-size: 12px; font-weight: 800; letter-spacing: 1.4px; fill: #708192; }
      .title { font-size: 20px; font-weight: 800; fill: #172532; }
      .body { font-size: 13px; font-weight: 650; fill: #526370; }
      .muted { font-size: 12px; font-weight: 650; fill: #758694; }
      .strong { font-size: 14px; font-weight: 800; fill: #1e303d; }
      .label { font-size: 12px; font-weight: 750; fill: #60727e; }
      .green { fill: #0f9662; }
      .orange { fill: #d97706; }
      .red { fill: #dc2626; }
    </style>
  </defs>

  <rect width="1180" height="760" rx="28" fill="url(#pageBg)"/>

  <g class="ui">
    <text x="56" y="58" font-size="26" font-weight="850" fill="#172532">Device 状态展示备选方案</text>
    <text x="56" y="84" font-size="14" font-weight="650" fill="#647585">同样表达 EDGE 已下发到 com.ffm.global，但信息密度和诊断深度不同。</text>

    <!-- Option A -->
    <g transform="translate(56 116)" filter="url(#softShadow)">
      <rect width="336" height="568" rx="18" fill="#ffffff"/>
    </g>
    <g transform="translate(84 148)">
      <text class="eyebrow" x="0" y="0">方案 A</text>
      <text class="title" x="0" y="31">紧凑状态条</text>
      <text class="body" x="0" y="56">适合你现在的面板，高度变化最小。</text>

      <g transform="translate(0 86)">
        <rect width="280" height="46" rx="10" fill="#f9fcfe" stroke="#d7e2ea"/>
        <text x="16" y="29" font-size="14" font-weight="800" fill="#22313d">Android VPN Agent</text>
        <path d="M244 19 l7 7 l7 -7" fill="none" stroke="#778896" stroke-width="2" stroke-linecap="round"/>
      </g>

      <g transform="translate(0 154)">
        <rect width="280" height="82" rx="13" fill="#f4fbf7" stroke="#bfe6d0"/>
        <rect x="14" y="14" width="64" height="24" rx="12" fill="#12a367"/>
        <text x="27" y="31" font-size="12" font-weight="850" fill="#fff">生效中</text>
        <text x="14" y="61" font-size="18" font-weight="850" fill="#173428">EDGE 网络</text>
        <rect x="128" y="42" width="132" height="26" rx="13" fill="#ffffff" stroke="#c8e7d5"/>
        <text x="143" y="60" font-size="12" font-weight="800" fill="#1d4936">com.ffm.global</text>
      </g>

      <g transform="translate(0 250)">
        <rect width="280" height="112" rx="12" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="16" y="28">限制参数</text>
        <text class="strong" x="16" y="55">↓ 240 Kbps   ↑ 120 Kbps</text>
        <text class="body" x="16" y="80">丢包 2% / 抖动 120ms</text>
        <text class="muted" x="16" y="101">链路：VPN -> SOCKS -> pf/dnctl</text>
      </g>

      <g transform="translate(0 376)">
        <rect width="280" height="58" rx="12" fill="#f9fbfc" stroke="#d8e3ea"/>
        <circle cx="19" cy="29" r="5" fill="#12a367"/>
        <text class="strong" x="34" y="26">验证正常</text>
        <text class="muted" x="34" y="44">tun0 有流量，SOCKS 拒绝 0</text>
      </g>

      <g transform="translate(0 454)">
        <rect width="280" height="54" rx="12" fill="#fff7ed" stroke="#f3cf9d"/>
        <circle cx="19" cy="27" r="5" fill="#f59e0b"/>
        <text class="strong" x="34" y="24" fill="#7a4b10">异常时</text>
        <text class="muted" x="34" y="42" fill="#805d2a">IP 不匹配或等待目标 App 流量</text>
      </g>
    </g>

    <!-- Option B -->
    <g transform="translate(422 116)" filter="url(#softShadow)">
      <rect width="336" height="568" rx="18" fill="#ffffff"/>
    </g>
    <g transform="translate(450 148)">
      <text class="eyebrow" x="0" y="0">方案 B</text>
      <text class="title" x="0" y="31">下发流程验证</text>
      <text class="body" x="0" y="56">强调每一步有没有走通，适合排查。</text>

      <g transform="translate(0 86)">
        <rect width="280" height="56" rx="13" fill="#132b3a"/>
        <text x="16" y="24" font-size="13" font-weight="750" fill="#b7cad5">当前任务</text>
        <text x="16" y="44" font-size="16" font-weight="850" fill="#ffffff">EDGE -> com.ffm.global</text>
      </g>

      <g transform="translate(8 166)">
        <line x1="12" y1="18" x2="12" y2="254" stroke="#cfdce5" stroke-width="3" stroke-linecap="round"/>

        <g transform="translate(0 0)">
          <circle cx="12" cy="18" r="10" fill="#12a367"/>
          <path d="M7 18 l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="strong" x="34" y="15">1. 命令已下发</text>
          <text class="muted" x="34" y="35">Agent 收到 preset=edge</text>
        </g>

        <g transform="translate(0 62)">
          <circle cx="12" cy="18" r="10" fill="#12a367"/>
          <path d="M7 18 l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="strong" x="34" y="15">2. 目标包名命中</text>
          <text class="muted" x="34" y="35">com.ffm.global</text>
        </g>

        <g transform="translate(0 124)">
          <circle cx="12" cy="18" r="10" fill="#12a367"/>
          <path d="M7 18 l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="strong" x="34" y="15">3. SOCKS 链路正常</text>
          <text class="muted" x="34" y="35">10.5.8.132 -> 10.5.8.87:8124</text>
        </g>

        <g transform="translate(0 186)">
          <circle cx="12" cy="18" r="10" fill="#12a367"/>
          <path d="M7 18 l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="strong" x="34" y="15">4. 弱网规则生效</text>
          <text class="muted" x="34" y="35">240/120 Kbps，plr 2%</text>
        </g>

        <g transform="translate(0 248)">
          <circle cx="12" cy="18" r="10" fill="#12a367"/>
          <path d="M7 18 l4 4 l7 -8" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <text class="strong" x="34" y="15">5. 真实流量验证</text>
          <text class="muted" x="34" y="35">tun0 与 tcpSuccess 持续增长</text>
        </g>
      </g>

      <g transform="translate(0 468)">
        <rect width="280" height="42" rx="11" fill="#eef8f2" stroke="#c5ead8"/>
        <text x="18" y="27" font-size="13" font-weight="850" fill="#137b51">下发成功，并已验证真实流量</text>
      </g>
    </g>

    <!-- Option C -->
    <g transform="translate(788 116)" filter="url(#softShadow)">
      <rect width="336" height="568" rx="18" fill="#ffffff"/>
    </g>
    <g transform="translate(816 148)">
      <text class="eyebrow" x="0" y="0">方案 C</text>
      <text class="title" x="0" y="31">诊断仪表盘</text>
      <text class="body" x="0" y="56">信息最多，适合你经常排查链路问题。</text>

      <g transform="translate(0 84)">
        <rect width="280" height="88" rx="14" fill="#142936"/>
        <rect x="16" y="16" width="64" height="24" rx="12" fill="#12a367"/>
        <text x="29" y="33" font-size="12" font-weight="850" fill="#fff">生效中</text>
        <text x="16" y="61" font-size="18" font-weight="850" fill="#ffffff">EDGE 网络</text>
        <text x="134" y="61" font-size="13" font-weight="800" fill="#b8cad5">com.ffm.global</text>
      </g>

      <g transform="translate(0 192)">
        <rect width="132" height="78" rx="12" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="14" y="26">SOCKS</text>
        <text class="strong" x="14" y="52">成功 12</text>
        <text class="muted" x="14" y="69">拒绝 0</text>

        <rect x="148" width="132" height="78" rx="12" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="162" y="26">tun0</text>
        <text class="strong" x="162" y="52">112 KB</text>
        <text class="muted" x="162" y="69">持续增长</text>
      </g>

      <g transform="translate(0 286)">
        <rect width="132" height="78" rx="12" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="14" y="26">限制</text>
        <text class="strong" x="14" y="52">240 / 120</text>
        <text class="muted" x="14" y="69">Kbps</text>

        <rect x="148" width="132" height="78" rx="12" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="162" y="26">丢包</text>
        <text class="strong" x="162" y="52">2%</text>
        <text class="muted" x="162" y="69">jitter 120ms</text>
      </g>

      <g transform="translate(0 388)">
        <rect width="280" height="86" rx="12" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="16" y="27">链路</text>
        <text class="body" x="16" y="52">Android VPN -> Mac SOCKS</text>
        <text class="body" x="16" y="73">pf/dnctl -> 外网</text>
        <path d="M232 35 l16 16 l-16 16" fill="none" stroke="#66808b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </g>

      <g transform="translate(0 494)">
        <rect width="280" height="34" rx="10" fill="#edf7fb" stroke="#cde4ef"/>
        <text x="16" y="23" font-size="13" font-weight="800" fill="#286072">展开查看 tproxy 日志和 dnctl 详情</text>
      </g>
    </g>
  </g>
</svg>
