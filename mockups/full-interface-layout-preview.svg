<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1080" viewBox="0 0 1440 1080">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f7f9"/>
      <stop offset="0.55" stop-color="#f5f7f6"/>
      <stop offset="1" stop-color="#f1f4ef"/>
    </linearGradient>
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#203949" flood-opacity="0.10"/>
    </filter>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; }
      .eyebrow { font-size: 12px; font-weight: 800; letter-spacing: 1.2px; fill: #657682; }
      .h1 { font-size: 28px; font-weight: 850; fill: #17222b; }
      .h2 { font-size: 18px; font-weight: 850; fill: #17222b; }
      .h3 { font-size: 15px; font-weight: 850; fill: #22313b; }
      .text { font-size: 13px; font-weight: 650; fill: #586a76; }
      .muted { font-size: 12px; font-weight: 650; fill: #768792; }
      .label { font-size: 12px; font-weight: 800; fill: #61727e; }
      .strong { font-size: 14px; font-weight: 850; fill: #1f303b; }
      .panel { fill: rgba(255,255,255,0.96); stroke: #dbe4ea; stroke-width: 1; rx: 8; }
      .input { fill: #f9fbfc; stroke: #d7e2ea; stroke-width: 1; rx: 8; }
      .line { stroke: #d8e3ea; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="1080" fill="url(#pageBg)"/>

  <g class="ui">
    <!-- Topbar -->
    <g transform="translate(40 32)">
      <text class="eyebrow" x="0" y="0">GAME NETWORK LAB</text>
      <text class="h1" x="0" y="38">游戏性能与弱网控制台</text>
      <g transform="translate(1038 2)">
        <rect width="260" height="38" rx="19" fill="#eef8f3" stroke="#c5ead8"/>
        <circle cx="20" cy="19" r="5" fill="#12a367"/>
        <text x="34" y="24" font-size="13" font-weight="850" fill="#137b51">EDGE 生效中 · com.ffm.global</text>
      </g>
      <g transform="translate(1310 0)">
        <rect width="42" height="42" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <path d="M26 13a10 10 0 1 0 3 7" fill="none" stroke="#293844" stroke-width="2" stroke-linecap="round"/>
        <path d="M28 9v8h-8" fill="none" stroke="#293844" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- Top row panels -->
    <g transform="translate(40 116)" filter="url(#panelShadow)">
      <rect class="panel" width="330" height="430"/>
    </g>
    <g transform="translate(386 116)" filter="url(#panelShadow)">
      <rect class="panel" width="1006" height="430"/>
    </g>

    <!-- Device panel -->
    <g transform="translate(64 142)">
      <text class="eyebrow" x="0" y="0">DEVICE</text>
      <text class="h2" x="0" y="28">测试设备</text>
      <g transform="translate(222 -12)">
        <rect width="60" height="28" rx="14" fill="#eef8f3" stroke="#c5ead8"/>
        <circle cx="15" cy="14" r="4" fill="#12a367"/>
        <text x="27" y="19" font-size="12" font-weight="850" fill="#137b51">在线</text>
      </g>

      <text class="label" x="0" y="68">模式</text>
      <rect class="input" x="0" y="78" width="282" height="42"/>
      <text class="strong" x="14" y="104">Android VPN Agent</text>
      <path d="M254 94 l7 7 l7 -7" fill="none" stroke="#758692" stroke-width="2" stroke-linecap="round"/>

      <text class="label" x="0" y="148">目标游戏</text>
      <rect class="input" x="0" y="158" width="282" height="42"/>
      <text class="strong" x="14" y="184">com.ffm.global</text>

      <g transform="translate(0 224)">
        <rect width="282" height="126" rx="8" fill="#f5fbf7" stroke="#bfe6d0"/>
        <rect x="14" y="14" width="66" height="24" rx="12" fill="#12a367"/>
        <text x="27" y="31" font-size="12" font-weight="850" fill="#ffffff">生效中</text>
        <text x="14" y="66" font-size="18" font-weight="850" fill="#183428">EDGE 网络</text>
        <text class="text" x="14" y="91">VPN -> SOCKS -> pf/dnctl</text>
        <text class="muted" x="14" y="113">240/120 Kbps · 丢包 2% · 抖动 120ms</text>
      </g>

      <g transform="translate(0 364)">
        <rect width="282" height="38" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <circle cx="18" cy="19" r="5" fill="#12a367"/>
        <text x="32" y="24" font-size="12.5" font-weight="800" fill="#233540">tun0 有流量，SOCKS 拒绝 0</text>
      </g>
    </g>

    <!-- Performance panel -->
    <g transform="translate(410 142)">
      <text class="eyebrow" x="0" y="0">PERFORMANCE</text>
      <text class="h2" x="0" y="28">实时网络曲线</text>
      <g transform="translate(180 5)">
        <rect width="66" height="28" rx="14" fill="#f0f7fb" stroke="#cfe4ee"/>
        <text x="15" y="19" font-size="12" font-weight="850" fill="#286072">波动中</text>
      </g>
      <g transform="translate(726 -4)">
        <rect width="112" height="32" rx="8" fill="#132b3a"/>
        <text x="23" y="21" font-size="13" font-weight="850" fill="#ffffff">实时网络曲线</text>
        <rect x="122" width="86" height="32" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <text x="142" y="21" font-size="13" font-weight="750" fill="#657682">性能监控</text>
      </g>

      <g transform="translate(0 66)">
        <rect width="958" height="42" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <line x1="18" y1="21" x2="54" y2="21" stroke="#0f7f8c" stroke-width="4" stroke-linecap="round"/>
        <text class="strong" x="64" y="26">下行限制 240 Kbps</text>
        <line x1="250" y1="21" x2="286" y2="21" stroke="#b56a00" stroke-width="4" stroke-linecap="round"/>
        <text class="strong" x="296" y="26">上行限制 120 Kbps</text>
        <text class="muted" x="714" y="26">最近检查 19:37:46</text>
      </g>

      <g transform="translate(0 130)">
        <rect width="958" height="250" rx="8" fill="#fbfdfe" stroke="#d8e3ea"/>
        <g stroke="#edf2f5" stroke-width="1">
          <line x1="0" y1="50" x2="958" y2="50"/>
          <line x1="0" y1="100" x2="958" y2="100"/>
          <line x1="0" y1="150" x2="958" y2="150"/>
          <line x1="0" y1="200" x2="958" y2="200"/>
          <line x1="160" y1="0" x2="160" y2="250"/>
          <line x1="320" y1="0" x2="320" y2="250"/>
          <line x1="480" y1="0" x2="480" y2="250"/>
          <line x1="640" y1="0" x2="640" y2="250"/>
          <line x1="800" y1="0" x2="800" y2="250"/>
        </g>
        <path d="M18 126 C90 105,128 152,198 132 S310 92,386 126 S510 170,592 138 S736 100,820 130 S900 166,940 144" fill="none" stroke="#0f7f8c" stroke-width="4" stroke-linecap="round"/>
        <path d="M18 176 C88 188,146 164,204 178 S332 206,406 182 S530 154,606 176 S734 210,806 188 S900 162,940 178" fill="none" stroke="#b56a00" stroke-width="4" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Lower panels -->
    <g transform="translate(40 566)" filter="url(#panelShadow)">
      <rect class="panel" width="330" height="360"/>
    </g>
    <g transform="translate(386 566)" filter="url(#panelShadow)">
      <rect class="panel" width="580" height="360"/>
    </g>
    <g transform="translate(982 566)" filter="url(#panelShadow)">
      <rect class="panel" width="410" height="170"/>
    </g>
    <g transform="translate(982 756)" filter="url(#panelShadow)">
      <rect class="panel" width="410" height="170"/>
    </g>

    <!-- Preset panel -->
    <g transform="translate(64 592)">
      <text class="eyebrow" x="0" y="0">PRESET</text>
      <text class="h2" x="0" y="28">弱网预设</text>
      <g transform="translate(164 -8)">
        <rect width="54" height="30" rx="15" fill="#132b3a"/>
        <text x="16" y="20" font-size="12" font-weight="850" fill="#ffffff">常用</text>
        <rect x="62" width="54" height="30" rx="15" fill="#ffffff" stroke="#d8e3ea"/>
        <text x="78" y="20" font-size="12" font-weight="750" fill="#657682">极端</text>
      </g>

      <g transform="translate(0 58)">
        <rect width="132" height="68" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="h3" x="14" y="27">正常网络</text>
        <text class="muted" x="14" y="48">不施加弱网</text>
        <rect x="150" width="132" height="68" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="h3" x="164" y="27">4G/LTE</text>
        <text class="muted" x="164" y="48">移动网络</text>
      </g>

      <g transform="translate(0 142)">
        <rect width="132" height="68" rx="8" fill="#eef8f3" stroke="#12a367" stroke-width="1.5"/>
        <text class="h3" x="14" y="27" fill="#173428">EDGE 网络</text>
        <text class="muted" x="14" y="48">极慢移动网络</text>
        <rect x="150" width="132" height="68" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="h3" x="164" y="27">高延迟</text>
        <text class="muted" x="164" y="48">RTT 1200ms</text>
      </g>

      <g transform="translate(0 226)">
        <rect width="132" height="68" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="h3" x="14" y="27">高丢包</text>
        <text class="muted" x="14" y="48">丢包 10%</text>
        <rect x="150" width="132" height="68" rx="8" fill="#fff7ed" stroke="#f2c994"/>
        <text class="h3" x="164" y="27" fill="#7a4b10">100% 丢包</text>
        <text class="muted" x="164" y="48" fill="#805d2a">完全阻断</text>
      </g>
    </g>

    <!-- Profile panel -->
    <g transform="translate(410 592)">
      <text class="eyebrow" x="0" y="0">PROFILE</text>
      <text class="h2" x="0" y="28">参数</text>
      <g transform="translate(438 -8)">
        <rect width="96" height="30" rx="15" fill="#ffffff" stroke="#d8e3ea"/>
        <circle cx="18" cy="15" r="7" fill="#d8e3ea"/>
        <text x="34" y="20" font-size="12" font-weight="750" fill="#657682">高级模式</text>
      </g>

      <g transform="translate(0 56)">
        <rect width="532" height="74" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="label" x="16" y="27">当前预设</text>
        <text x="16" y="54" font-size="21" font-weight="850" fill="#17222b">EDGE 网络</text>
        <text class="text" x="176" y="54">极慢移动网络，适合首包、重连、超时验证</text>
      </g>

      <g transform="translate(0 150)">
        <rect width="116" height="58" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <text class="label" x="12" y="23">RTT</text>
        <text class="strong" x="12" y="45">400 ms</text>
        <rect x="138" width="116" height="58" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <text class="label" x="150" y="23">抖动</text>
        <text class="strong" x="150" y="45">120 ms</text>
        <rect x="276" width="116" height="58" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <text class="label" x="288" y="23">丢包</text>
        <text class="strong" x="288" y="45">2%</text>
        <rect x="414" width="118" height="58" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <text class="label" x="426" y="23">带宽</text>
        <text class="strong" x="426" y="45">240 / 120</text>
      </g>

      <g transform="translate(0 254)">
        <rect width="254" height="52" rx="8" fill="#087f8c"/>
        <text x="96" y="33" font-size="15" font-weight="850" fill="#ffffff">应用预设</text>
        <rect x="278" width="254" height="52" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
        <text x="374" y="33" font-size="15" font-weight="850" fill="#253540">清除弱网</text>
      </g>
    </g>

    <!-- Runtime panel -->
    <g transform="translate(1006 592)">
      <text class="eyebrow" x="0" y="0">RUNTIME</text>
      <text class="h2" x="0" y="28">弱网命令预览</text>
      <g transform="translate(0 58)">
        <rect width="362" height="82" rx="8" fill="#101820"/>
        <text x="16" y="28" font-size="12" font-family="Menlo, Consolas, monospace" fill="#c7d4dc">pfctl -a weaknet_lab -f -</text>
        <text x="16" y="52" font-size="12" font-family="Menlo, Consolas, monospace" fill="#a9d6c0">dnctl pipe 61001 config ...</text>
      </g>
    </g>

    <!-- History panel -->
    <g transform="translate(1006 782)">
      <text class="eyebrow" x="0" y="0">REPORT</text>
      <text class="h2" x="0" y="28">历史记录</text>
      <g transform="translate(0 58)">
        <rect width="362" height="78" rx="8" fill="#f8fafc" stroke="#d8e3ea"/>
        <text class="h3" x="14" y="27">EDGE 网络 · 生效中</text>
        <text class="muted" x="14" y="50">com.ffm.global · Android VPN Agent</text>
        <text class="muted" x="254" y="50">19:37:46</text>
      </g>
    </g>

    <!-- Footer note -->
    <g transform="translate(40 968)">
      <rect width="1352" height="58" rx="8" fill="#ffffff" stroke="#d8e3ea"/>
      <circle cx="24" cy="29" r="6" fill="#12a367"/>
      <text x="42" y="25" font-size="14" font-weight="850" fill="#20313b">推荐布局：顶部只回答“当前是否生效、作用到哪个包名”，详细链路验证放在 Device 状态块和可展开详情里。</text>
      <text x="42" y="43" font-size="12" font-weight="650" fill="#6f808b">这样不会让用户在 Runtime、History、Performance 之间来回找状态。</text>
    </g>
  </g>
</svg>
