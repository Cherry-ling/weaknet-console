<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Launcher Authorization Copy Preview</title>
    <style>
      :root {
        --surface: #ffffff;
        --text: #17232c;
        --text-muted: #536678;
        --primary: #0f8d96;
        --primary-strong: #087f8c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(8, 127, 140, 0.12), transparent 36%),
          rgba(16, 32, 38, 0.34);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preview-shell {
        width: 100vw;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        backdrop-filter: blur(10px);
      }

      .launcher-card {
        width: min(560px, calc(100vw - 32px));
        display: grid;
        gap: 14px;
        padding: 24px;
        border: 1px solid #cbd9e0;
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 28px 80px rgba(16, 32, 38, 0.26);
      }

      .eyebrow,
      h2,
      .launcher-copy,
      .launcher-note {
        margin: 0;
      }

      .eyebrow {
        color: #647789;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h2 {
        color: var(--text);
        font-size: 22px;
        line-height: 1.2;
      }

      .launcher-copy {
        color: var(--text-muted);
        line-height: 1.55;
      }

      .launcher-status {
        min-height: 44px;
        display: flex;
        align-items: center;
        padding: 0 13px;
        border: 1px solid #d7e2e8;
        border-radius: 8px;
        background: #f8fbfc;
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
      }

      .launcher-flow {
        display: grid;
        grid-template-columns: 1fr 24px 1fr 24px 1fr;
        align-items: center;
        gap: 8px;
        padding: 12px;
        border: 1px solid #dce5eb;
        border-radius: 8px;
        background: #fbfdfe;
        color: #425466;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      }

      .launcher-flow i {
        height: 2px;
        border-radius: 999px;
        background: #bfd0d9;
      }

      .launcher-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      button {
        min-height: 44px;
        border-radius: 8px;
        font: inherit;
        font-weight: 900;
        cursor: default;
      }

      .primary-button {
        border: 1px solid var(--primary-strong);
        background: var(--primary);
        color: #ffffff;
      }

      .secondary-button {
        border: 1px solid #d7e2e8;
        background: #ffffff;
        color: var(--text);
      }

      .launcher-note {
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="preview-shell">
      <section class="launcher-card" role="dialog" aria-modal="true" aria-labelledby="launcherTitle">
        <p class="eyebrow">Launcher</p>
        <h2 id="launcherTitle">需要管理员授权</h2>
        <p class="launcher-copy">
          为模拟真实弱网环境，本工具需要临时调整本机网络规则，用于实现延迟、丢包、限速和断网等效果。点击继续后，macOS 将弹出系统授权框。
        </p>
        <div class="launcher-status">弱网服务未授权</div>
        <div class="launcher-flow" aria-label="启动流程">
          <span>启动页检测</span>
          <i aria-hidden="true"></i>
          <span>系统授权</span>
          <i aria-hidden="true"></i>
          <span>进入控制台</span>
        </div>
        <div class="launcher-actions">
          <button class="primary-button" type="button">继续授权</button>
          <button class="secondary-button" type="button">重新检测</button>
        </div>
        <p class="launcher-note">
          授权仅用于启动本机弱网服务，不会读取或保存您的密码；清除弱网后网络规则将恢复正常。
        </p>
      </section>
    </main>
  </body>
</html>
